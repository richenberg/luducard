name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: pnpm --dir ui install --no-frozen-lockfile

      - name: build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Luducard v__VERSION__'
          releaseBody: 'See the assets below to download Luducard v__VERSION__ for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: package portable zip (windows only)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $binPath = Get-ChildItem -Path . -Filter "Luducard.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -notmatch "bundle" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $binPath) {
              $binPath = Get-ChildItem -Path . -Filter "luducard-tauri.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $binPath) {
              Write-Error "Could not find the compiled binary Luducard.exe or luducard-tauri.exe"
              exit 1
          }
          Write-Output "Found binary at: $binPath"
          New-Item -ItemType Directory -Force -Path temp_portable
          Copy-Item -Path $binPath -Destination temp_portable/Luducard.exe
          Compress-Archive -Path temp_portable/* -DestinationPath Luducard_x64_portable.zip

      - name: upload portable zip (windows only)
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Luducard_x64_portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
